[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "didactopus"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = ["pydantic>=2.7", "pyyaml>=6.0"]

[project.scripts]
didactopus-demo-run = "didactopus.demo_run:main"

[tool.setuptools.packages.find]
where = ["src"]
