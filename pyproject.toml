[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "didactopus"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
  "pydantic>=2.7",
  "pyyaml>=6.0",
  "fastapi>=0.115",
  "uvicorn>=0.30"
]

[project.scripts]
didactopus-api = "didactopus.api:main"

[tool.setuptools.packages.find]
where = ["src"]
